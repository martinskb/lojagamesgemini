<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - A sua loja de games</title>
    <style>
        /* CSS Básico inspirado em lojas modernas */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f3f4f6; color: #333; }
        
        header { background-color: #232f3e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ff9900; }
        .cart-btn { background-color: #ff9900; color: #111; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .cart-btn:hover { background-color: #e38800; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 2rem; }

        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; }
        
        .produto-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; display: flex; flex-direction: column;}
        .produto-card:hover { transform: translateY(-5px); }
        .produto-img { width: 100%; height: 200px; object-fit: cover; }
        .produto-info { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
        .produto-categoria { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 0.5rem; }
        .produto-nome { font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; flex-grow: 1; }
        .produto-preco { font-size: 1.5rem; font-weight: bold; color: #b12704; margin-bottom: 1rem; }
        
        .btn-comprar { background-color: #ffd814; border: 1px solid #fcd200; border-radius: 20px; padding: 0.5rem; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-comprar:hover { background-color: #f7ca00; }
    </style>
</head>
<body>

    <header>
        <div class="logo">GameStore</div>
        <div>
            <input type="text" placeholder="Buscar jogos, consoles..." style="padding: 0.5rem; width: 300px; border-radius: 4px; border: none;">
        </div>
        <button class="cart-btn">🛒 Carrinho (0)</button>
    </header>

    <div class="container">
        <h1>Destaques da Semana</h1>
        <div class="grid-produtos" id="lista-produtos">
            </div>
    </div>

    <script>
        // Lógica do Frontend: Busca os dados do Backend
        async function carregarProdutos() {
            try {
                const resposta = await fetch('/api/produtos');
                const produtos = await resposta.json();
                
                const grid = document.getElementById('lista-produtos');
                grid.innerHTML = '';

                produtos.forEach(produto => {
                    // Formata o preço para o padrão brasileiro
                    const precoFormatado = produto.preco.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    
                    const card = document.createElement('div');
                    card.className = 'produto-card';
                    card.innerHTML = `
                        <img src="${produto.imagem}" alt="${produto.nome}" class="produto-img">
                        <div class="produto-info">
                            <span class="produto-categoria">${produto.categoria}</span>
                            <div class="produto-nome">${produto.nome}</div>
                            <div class="produto-preco">${precoFormatado}</div>
                            <button class="btn-comprar" onclick="adicionarAoCarrinho('${produto.nome}')">Adicionar ao Carrinho</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (erro) {
                console.error('Erro ao carregar produtos:', erro);
            }
        }

        // Função simples para simular o carrinho
        let itensNoCarrinho = 0;
        function adicionarAoCarrinho(nome) {
            itensNoCarrinho++;
            document.querySelector('.cart-btn').innerText = `🛒 Carrinho (${itensNoCarrinho})`;
            alert(`${nome} adicionado ao carrinho!`);
        }

        // Executa a função quando a página carrega
        window.onload = carregarProdutos;
    </script>
</body>
</html>
